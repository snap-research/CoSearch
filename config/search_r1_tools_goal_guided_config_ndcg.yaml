# Search R1 Tools Configuration with Reranker
# This file defines the tool instances used by SearchR1AgentLoop with reranker enabled

tools:
  - class_name: verl.tools.co_search_tool.CoSearchTool
    config:
      type: native  # Native Python tool (not MCP)
      
      # Dense Retrieval Configuration
      retrieval_service_url: "http://10.128.0.71:8000/retrieve"
      timeout: 30  # HTTP request timeout in seconds
      
      # Retry Configuration (to handle API overload)
      max_retries: 3  # Number of retry attempts if API fails
      retry_delay: 1.0  # Initial retry delay in seconds
      retry_backoff: 2.0  # Exponential backoff multiplier (1s -> 2s -> 4s)
      
      # Retrieval parameters
      default_top_n: 50  # Number of documents to retrieve from dense retrieval
      default_top_m: 5   # Number of documents to return after reranking

      hit_cutoffs: [1, 3, 5]  # Cutoffs for Hit@k reward calculation

      # Tool score metric: "hit" (Average Hit@k) or "ndcg" (NDCG@M via pytrec_eval)
      tool_score_metric: "ndcg"

      # Trivial answers to skip for document relevancy checking
      # When ALL answers are trivial, answer_in_docs = False and tool_score = 0 on reranker success
      trivial_answers: ["yes", "no", "true", "false"]

      format_penalty: -0.2
      
      # Rate limiting (optional)
      # max_concurrent_per_worker: 16  # Default concurrency per worker
    
    # Tool schema is auto-generated in SearchR1Tool.__init__
    # The tool will be registered with name "search"
